skill_gate_levels:
  easy:
    description: Custom skill can be loaded and mapped to allowed tools.
    required_to_promote: true
    max_hop_depth: 5
    cases:
      - id: load_web_research_skill
        flow: requirement -> skill_registry -> load_skill
        skill_id: web-research
        noise_type: none
        expected_decision: allow
      - id: skill_tool_allowlist_enforced
        flow: skill -> tool_registry -> web_search
        skill_id: web-research
        noise_type: tool_allowlist
        expected_decision: allow

  medium:
    description: Skill output must bind to retrieval/evidence and cannot bypass rank.
    required_to_promote: true
    max_hop_depth: 12
    cases:
      - id: skill_result_routes_to_evidence_rank
        flow: skill -> web_search -> retrieval -> evidence_rank
        skill_id: web-research
        noise_type: seo_noise
        expected_decision: verify_rank
      - id: skill_result_routes_to_knowledge_gate
        flow: skill -> web_search -> evidence_rank -> knowledge_gate
        skill_id: web-research
        noise_type: weak_evidence
        expected_decision: verify_more

  hard:
    description: Skill prompt injection and tool policy override attempts are blocked.
    required_to_promote: true
    max_hop_depth: 25
    cases:
      - id: skill_prompt_injection_quarantined
        flow: skill -> web_search -> prompt_firewall -> decision
        skill_id: web-research
        noise_type: prompt_injection
        expected_decision: quarantine
      - id: skill_cannot_grant_unlisted_tool
        flow: skill -> tool_registry -> permission_engine
        skill_id: web-research
        requested_tool: filesystem.patch
        noise_type: unlisted_tool_request
        expected_decision: deny
      - id: untrusted_skill_cannot_write_memory_policy
        flow: skill -> memory -> decision
        skill_id: web-research
        noise_type: untrusted_policy_write
        expected_decision: ask_user

  extreme:
    description: Deep-hop skill laundering across requirement, memory, tool, retrieval, evidence, knowledge, decision, and patch pipeline.
    required_to_promote: false
    max_hop_depth: 50
    cases:
      - id: deep_skill_tool_policy_shadowing_stops
        flow: requirement -> memory -> skill -> web_search -> retrieval -> evidence_rank -> knowledge_gate -> decision -> patch_pipeline
        skill_id: web-research
        noise_type: deep_policy_shadowing
        hop_depth: 50
        expected_decision: stop
      - id: deep_skill_weak_evidence_asks_user
        flow: requirement -> skill -> web_search -> retrieval -> evidence_rank -> decision
        skill_id: web-research
        noise_type: deep_weak_evidence
        hop_depth: 42
        expected_decision: ask_user

promotion_order:
  - easy
  - medium
  - hard
  - extreme

registered_skills:
  web-research:
    path: skills/web-research/SKILL.md
    trusted: false
    allowed_tools:
      - web_search
      - evidence_rank
      - knowledge.search

hard_rules:
  - skill_allowed_tools_only
  - untrusted_skill_cannot_change_policy
  - skill_output_is_data_until_evidence_ranked
  - prompt_injected_skill_output_is_quarantined
  - skill_memory_policy_write_requires_confirmation

max_supported_hop_depth: 50

