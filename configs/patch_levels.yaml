patch_levels:
  easy:
    description: Smallest safe patch. Prefer docs, config, or one focused function.
    max_files_changed: 1
    max_changed_lines: 40
    max_functions_changed: 1
    max_new_dependencies: 0
    max_hop_depth: 5
    risk_ceiling: 0.30
    requires_confirmation: false
    requires_focused_harness: true
    requires_full_tests: false
    requires_rollback_plan: false
    allowed_change_types:
      - docs
      - tests
      - config
      - single_function
    forbidden_change_types:
      - schema_migration
      - public_api_change
      - dependency_change
      - security_policy_change

  medium:
    description: Normal feature patch with focused implementation and tests.
    max_files_changed: 2
    max_changed_lines: 100
    max_functions_changed: 3
    max_new_dependencies: 0
    max_hop_depth: 12
    risk_ceiling: 0.50
    requires_confirmation: false
    requires_focused_harness: true
    requires_full_tests: true
    requires_rollback_plan: false
    allowed_change_types:
      - tests
      - config
      - feature_slice
      - internal_refactor
    forbidden_change_types:
      - schema_migration
      - public_api_change
      - dependency_change

  hard:
    description: Risky local patch that touches more modules or behavior boundaries.
    max_files_changed: 3
    max_changed_lines: 180
    max_functions_changed: 6
    max_new_dependencies: 0
    max_hop_depth: 25
    risk_ceiling: 0.70
    requires_confirmation: true
    requires_focused_harness: true
    requires_full_tests: true
    requires_rollback_plan: true
    allowed_change_types:
      - multi_module_feature
      - behavior_refactor
      - queue_or_worker_logic
      - retrieval_or_memory_logic
    forbidden_change_types:
      - schema_migration_without_confirmation
      - public_api_change_without_confirmation
      - dependency_change_without_confirmation

  extreme:
    description: Core or high-risk patch. Must be split unless explicitly approved.
    max_files_changed: 3
    max_changed_lines: 240
    max_functions_changed: 8
    max_new_dependencies: 0
    max_hop_depth: 50
    risk_ceiling: 0.85
    requires_confirmation: true
    requires_focused_harness: true
    requires_full_tests: true
    requires_rollback_plan: true
    requires_security_gate: true
    split_preferred: true
    allowed_change_types:
      - core_agent_loop
      - decision_gate
      - security_gate
      - tool_runtime
      - patch_pipeline
    forbidden_change_types:
      - destructive_tooling
      - unreviewed_schema_migration
      - unreviewed_public_api_change
      - unreviewed_dependency_change

promotion_order:
  - easy
  - medium
  - hard
  - extreme

global_rules:
  - no_patch_without_requirement_id
  - no_patch_without_harness
  - no_production_patch_before_harness_review
  - no_dependency_change_without_confirmation
  - no_schema_change_without_confirmation
  - no_public_api_change_without_confirmation
  - rollback_on_failed_required_gate

